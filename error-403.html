<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Truy cập bị từ chối</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            text-align: center;
        }

        h1 {
            font-size: 6rem;
            margin: 0;
            color: #dc3545;
        }

        h2 {
            font-size: 2rem;
            margin: 10px 0;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            max-width: 500px;
        }

        a {
            margin-top: 25px;
            display: inline-block;
            text-decoration: none;
            background-color: #007bff;
            color: #fff;
            padding: 12px 24px;
            border-radius: 6px;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: #0056b3;
        }

        .icon-lock {
            font-size: 3rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="icon-lock">🔒</div>
    <h1>403</h1>
    <h2>Truy cập bị từ chối</h2>
    <p>Bạn không có quyền truy cập vào trang này.<br>Vui lòng kiểm tra lại quyền hoặc liên hệ với quản trị viên.</p>
    <a href="/">Quay lại trang chủ</a>

</body>
</html>
